name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write       # changesets commits the version bump + tag
      pull-requests: write  # changesets opens the 'Version Packages' PR
      id-token: write       # OIDC for npm provenance attestations
    steps:
      # GitHub Actions are pinned to commit SHAs (not version tags) — tags
      # are mutable, SHAs aren't. Dependabot keeps these up to date.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@91ab88e2619ed1f46221f0ba42d1492c02baf788 # v6.0.6

      # Node 24 ships with npm 11.x out of the box — required for
      # Trusted Publishing (npm CLI >= 11.5.1 exchanges the workflow's
      # OIDC token for a publish credential). Node 22 ships npm 10.x,
      # and `npm install -g npm@latest` is unreliable in CI because npm
      # corrupts its own node_modules during the in-place self-upgrade
      # (MODULE_NOT_FOUND on `promise-retry`). Bumping Node is cleaner.
      #
      # CI workflow stays on the [18.17, 20, 22] matrix so we keep
      # validating the floor declared in package.json#engines.node.
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Test
        run: pnpm test

      - name: Create Release Pull Request or Publish
        uses: changesets/action@63a615b9cd06ba9a3e6d13796c7fbcb080a60a0b # v1.8.0
        with:
          publish: pnpm release
          version: pnpm changeset version
          commit: 'chore: release'
          title: 'chore: release'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No NPM_TOKEN — this package uses npm Trusted Publishing
          # (OIDC). The trust is anchored on npm in the package's
          # 'Trusted Publisher' setting (carvil/astro-recommends,
          # release.yml). The 'id-token: write' permission below lets
          # the workflow request an OIDC token; npm CLI 11.5.1+ exchanges
          # it for a publish credential automatically.
          NPM_CONFIG_PROVENANCE: 'true'

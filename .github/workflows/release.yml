name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write       # changesets commits the version bump + tag
      pull-requests: write  # changesets opens the 'Version Packages' PR
      id-token: write       # OIDC for npm provenance attestations
    steps:
      # GitHub Actions are pinned to commit SHAs (not version tags) — tags
      # are mutable, SHAs aren't. Dependabot keeps these up to date.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d # v6.0.5

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      # npm Trusted Publishing requires npm CLI >= 11.5.1; Node 22 ships
      # with npm 10.x. Force-upgrade npm globally so `npm publish` can
      # exchange the GitHub OIDC token for a publish credential. Without
      # this, the publish step sends an unauthenticated PUT and npm
      # responds with a 404 (which it intentionally returns for permission
      # failures to avoid leaking package-existence info).
      - name: Upgrade npm for Trusted Publishing
        run: npm install -g npm@latest

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Test
        run: pnpm test

      - name: Create Release Pull Request or Publish
        uses: changesets/action@6a0a831ff30acef54f2c6aa1cbbc1096b066edaf # v1.7.0
        with:
          publish: pnpm release
          version: pnpm changeset version
          commit: 'chore: release'
          title: 'chore: release'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No NPM_TOKEN — this package uses npm Trusted Publishing
          # (OIDC). The trust is anchored on npm in the package's
          # 'Trusted Publisher' setting (carvil/astro-recommends,
          # release.yml). The 'id-token: write' permission below lets
          # the workflow request an OIDC token; npm CLI 11.5.1+ exchanges
          # it for a publish credential automatically.
          NPM_CONFIG_PROVENANCE: 'true'
